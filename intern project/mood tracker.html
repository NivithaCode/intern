<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Review</title>
<link rel="stylesheet" href="mood-tracker.css">
</head>
<body>

<div class="card">

  <div class="card-header">
    <p class="eyebrow">🎬 Rate it</p>
    <h1>Your <span>Movie Review</span></h1>
  </div>

  <div class="field">
    <label>Movie</label>
    <select id="movie">
      <option>Interstellar</option>
      <option>RRR</option>
      <option>Jawan</option>
    </select>
  </div>

  <div class="field">
    <label>Your Review</label>
    <textarea id="review" placeholder="What did you think about this movie?"></textarea>
  </div>

  <div class="field">
    <p class="mood-label">Your Mood</p>
    <div class="mood-grid" id="moodGrid">
      <button class="mood-btn" onclick="selectMood('😊', this)">😊</button>
      <button class="mood-btn" onclick="selectMood('😍', this)">😍</button>
      <button class="mood-btn" onclick="selectMood('😢', this)">😢</button>
      <button class="mood-btn" onclick="selectMood('🔥', this)">🔥</button>
      <button class="mood-btn" onclick="selectMood('😂', this)">😂</button>
      <button class="mood-btn" onclick="selectMood('😱', this)">😱</button>
    </div>
    <p class="mood-status" id="moodStatus">Pick a mood above</p>
  </div>

  <div class="divider"></div>

  <button class="submit-btn" onclick="submitReview()">Submit Review →</button>

  <div class="result-box" id="resultBox">
    <div class="result-movie" id="resultMovie"></div>
    <div class="result-row">
      <span id="resultMood" class="result-mood-emoji"></span>
      <span id="resultMoodText"></span>
    </div>
    <div class="result-row">
      💬 <span id="resultReview"></span>
    </div>
  </div>

</div>

<script src="review.js"></script>
</body>
</html>
