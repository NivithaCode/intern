<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movies Review & Rating – Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="Register-style.css"/>
</head>
<body>

  <!-- BOOTSTRAP NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark border-bottom  border-danger">
    <div class="container-fluid px-4">

      <a class="navbar-brand fw-bold fs-5 text-white" href="#">M&#127916;VIES</a>

      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#mainNav"
              aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Top Rated</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Reviews</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Watchlist</a></li>
        </ul>
        <div class="d-flex align-items-center gap-2">
          
        </div>
      </div>

    </div>
  </nav>

  <!-- EXISTING LAYOUT -->
  <div class="container">
    <div class="left">
      <div class="poster-grid">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </div>
      <div class="left-content">
        <div class="clap-icon">
          <div class="clap-top">
            <span class="stripe"></span><span class="stripe"></span>
            <span class="stripe"></span><span class="stripe"></span>
            <span class="stripe"></span>
          </div>
          <div class="clap-body">
            <div class="play-btn"></div>
          </div>
        </div>
        <div class="brand-name">M<span>&#127916;</span>VIES</div>
        <div class="brand-sub">Review &amp; Rating</div>
        <div class="tagline">Explore. Review. Rate.</div>
        <div class="tagline-accent">Your Opinion Matters!</div>
        <div class="features">
          <div class="feat">
            <div class="feat-icon">&#11088;</div>
            <div class="feat-label">Discover Amazing Movies</div>
          </div>
          <div class="feat">
            <div class="feat-icon">&#9999;&#65039;</div>
            <div class="feat-label">Review &amp; Share Your Thoughts</div>
          </div>
          <div class="feat">
            <div class="feat-icon">&#128156;</div>
            <div class="feat-label">Rate Your Experience</div>
          </div>
        </div>
      </div>
      <div class="popcorn">&#127871;</div>
    </div>

    <div class="right">
      <div class="avatar-ring">&#128100;</div>
      <div class="form-title"><span>Create</span> Your Account</div>

      <div class="input-group">
        <span class="input-icon">&#128100;</span>
        <input type="text" placeholder="Full Name" autocomplete="name"/>
      </div>

      <div class="input-group">
        <span class="input-icon">&#128140;</span>
        <input type="email" placeholder="Email Address" autocomplete="email"/>
      </div>

      <div class="input-group">
        <span class="input-icon">&#128274;</span>
        <input type="password" placeholder="Password" autocomplete="new-password"/>
      </div>

      <div class="input-group">
        <span class="input-icon">&#128274;</span>
        <input type="password" placeholder="Confirm Password" autocomplete="new-password"/>
      </div>

      <div class="dob-label">Date of Birth</div>
      <div class="dob-row">
        <select>
          <option value="">DD</option>
          <option>1</option><option>2</option><option>3</option><option>4</option>
          <option>5</option><option>6</option><option>7</option><option>8</option>
          <option>9</option><option>10</option><option>11</option><option>12</option>
          <option>13</option><option>14</option><option>15</option><option>16</option>
          <option>17</option><option>18</option><option>19</option><option>20</option>
          <option>21</option><option>22</option><option>23</option><option>24</option>
          <option>25</option><option>26</option><option>27</option><option>28</option>
          <option>29</option><option>30</option><option>31</option>
        </select>
        <select>
          <option value="">MM</option>
          <option value="1">Jan</option><option value="2">Feb</option>
          <option value="3">Mar</option><option value="4">Apr</option>
          <option value="5">May</option><option value="6">Jun</option>
          <option value="7">Jul</option><option value="8">Aug</option>
          <option value="9">Sep</option><option value="10">Oct</option>
          <option value="11">Nov</option><option value="12">Dec</option>
        </select>
        <select>
          <option value="">YYYY</option>
          <option>2008</option><option>2007</option><option>2006</option>
          <option>2005</option><option>2004</option><option>2003</option>
          <option>2002</option><option>2001</option><option>2000</option>
          <option>1999</option><option>1998</option><option>1997</option>
          <option>1996</option><option>1995</option><option>1994</option>
          <option>1993</option><option>1992</option><option>1991</option>
          <option>1990</option>
        </select>
      </div>

      <div class="terms-row">
        <input type="checkbox" id="terms"/>
        <label for="terms">I agree to the <a href="#">Terms &amp; Conditions</a> and <a href="#">Privacy Policy</a></label>
      </div>

      <a href="login.html" style="width:100%; text-decoration:none;">
        <button class="btn-register" type="button">REGISTER &#8594;</button>
      </a>

      <div class="login-link">Already have an account? <a href="login.html">Login</a></div>
    </div>
  </div>


</body>
</html>
