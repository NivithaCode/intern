<!DOCTYPE html>
<html>
<head>
    <title>Spotify Dashboard</title>
    <link rel="stylesheet" href="spotify-style.css">
</head>

<body>

<div class="main">

    <div class="sidebar">

            </div>


            <div class="card">

            </div>


            <div class="card">
                <img src="nallaru-po-1.jpg">
                <div> Nallaru Po</div>
                <p>Sai Abhyankkar</p>
                <button>Play</button>
            </div>

        </div>


        <h2>Recently Played</h2>

        <div class="cards">

            <div class="card">
                <img src="nallaru-po-2.jpg">

            </div>



        </div>

</div>

</html>
